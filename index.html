<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarvish — Page Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
.logo { font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.tagline { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 60px; letter-spacing: 1px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 640px; }
@media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
.card {
  border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
  padding: 28px 24px; text-decoration: none; color: #fff;
  background: #050505;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  display: flex; flex-direction: column; gap: 8px;
}
.card:hover { background: rgba(23,112,241,0.07); border-color: rgba(23,112,241,0.3); transform: translateY(-2px); }
.card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #1770f1; font-weight: 500; }
.card-title { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 600; }
.card-sub { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 300; }
.card-arrow { font-size: 18px; color: #1770f1; margin-top: 8px; }
/* ===== CUSTOM CURSOR ===== */
.cursor{width:20px;height:20px;border-radius:100%;border:1px solid #fff;transition:all 200ms ease-out;position:fixed;pointer-events:none;left:0;top:0;transform:translate(calc(-50% + 15px),-50%);z-index:9999;mix-blend-mode:difference;}
.cursor2{width:5px;height:5px;border-radius:100%;background-color:#fff;opacity:.3;position:fixed;transform:translate(-50%,-50%);pointer-events:none;transition:width .3s,height .3s,opacity .3s;z-index:9999;}
.cursorinnerhover{width:50px;height:50px;opacity:.5;}
</style>
</head>
<body>
<div class="cursor"></div>
<div class="cursor2"></div>
  <div class="logo">Aarvish</div>
  <div class="tagline">Innovative water &amp; renewable technologies</div>
  <div class="grid">
    <a href="Innovation - destop final.html" class="card">
      <div class="card-label">Innovation Page</div>
      <div class="card-title">Innovation</div>
      <div class="card-sub">Desktop version</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="Innovation-Mobile.html" class="card">
      <div class="card-label">Innovation Page</div>
      <div class="card-title">Innovation</div>
      <div class="card-sub">Mobile version</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="Inquiry.html" class="card">
      <div class="card-label">Inquiry Page</div>
      <div class="card-title">Inquiry</div>
      <div class="card-sub">Desktop version</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="Inquiry-Mobile.html" class="card">
      <div class="card-label">Inquiry Page</div>
      <div class="card-title">Inquiry</div>
      <div class="card-sub">Mobile version</div>
      <div class="card-arrow">→</div>
    </a>
  </div>
<script>
// Custom cursor
(function(){
  var cursor = document.querySelector('.cursor');
  var cursorinner = document.querySelector('.cursor2');
  if(!cursor || !cursorinner) return;
  document.addEventListener('mousemove', function(e){
    cursor.style.transform = 'translate3d(calc('+e.clientX+'px - 50%),calc('+e.clientY+'px - 50%),0)';
    cursorinner.style.left = e.clientX+'px';
    cursorinner.style.top = e.clientY+'px';
  });
  document.addEventListener('mousedown', function(){ cursor.classList.add('click'); cursorinner.classList.add('cursorinnerhover'); });
  document.addEventListener('mouseup', function(){ cursor.classList.remove('click'); cursorinner.classList.remove('cursorinnerhover'); });
  document.querySelectorAll('a,button,[role="button"]').forEach(function(a){
    a.addEventListener('mouseover', function(){ cursor.classList.add('hover'); });
    a.addEventListener('mouseleave', function(){ cursor.classList.remove('hover'); });
  });
})();
</script>
</body>
</html>
