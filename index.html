<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarvish — Page Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
.logo { font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.tagline { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 60px; letter-spacing: 1px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 640px; }
@media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
.card {
  border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
  padding: 28px 24px; text-decoration: none; color: #fff;
  background: #050505;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  display: flex; flex-direction: column; gap: 8px;
}
.card:hover { background: rgba(23,112,241,0.07); border-color: rgba(23,112,241,0.3); transform: translateY(-2px); }
.card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #1770f1; font-weight: 500; }
.card-title { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 600; }
.card-sub { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 300; }
.card-arrow { font-size: 18px; color: #1770f1; margin-top: 8px; }
/* ===== CUSTOM CURSOR ===== */
.cursor{width:20px;height:20px;border-radius:100%;border:1px solid #fff;transition:all 200ms ease-out;position:fixed;pointer-events:none;left:0;top:0;transform:translate(calc(-50% + 15px),-50%);z-index:9999;mix-blend-mode:difference;}
.cursor2{width:5px;height:5px;border-radius:100%;background-color:#fff;opacity:.3;position:fixed;transform:translate(-50%,-50%);pointer-events:none;transition:width .3s,height .3s,opacity .3s;z-index:9999;}
.cursorinnerhover{width:50px;height:50px;opacity:.5;}
/* ===== WATER CURSOR ===== */
*{cursor:none!important;}
.wc-ring{position:fixed;width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(23,112,241,0.55);background:radial-gradient(circle,rgba(23,112,241,0.07) 0%,transparent 70%);transform:translate(-50%,-50%);pointer-events:none;z-index:99999;transition:width .35s cubic-bezier(.25,.46,.45,.94),height .35s cubic-bezier(.25,.46,.45,.94),border-color .3s,background .3s,border-radius .35s;}
.wc-dot{position:fixed;width:5px;height:5px;border-radius:50%;background:#4da3ff;transform:translate(-50%,-50%);pointer-events:none;z-index:100000;box-shadow:0 0 6px rgba(77,163,255,0.95),0 0 18px rgba(23,112,241,0.6),0 0 32px rgba(23,112,241,0.25);transition:width .2s,height .2s,box-shadow .2s;}
.wc-ring.hover{width:56px;height:56px;border-color:rgba(23,112,241,0.85);background:radial-gradient(circle,rgba(23,112,241,0.12) 0%,transparent 70%);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;}
.wc-ring.click{width:64px;height:64px;border-color:rgba(77,163,255,1);background:radial-gradient(circle,rgba(23,112,241,0.18) 0%,transparent 70%);}
.wc-dot.click{width:9px;height:9px;box-shadow:0 0 10px rgba(77,163,255,1),0 0 28px rgba(23,112,241,0.8),0 0 50px rgba(23,112,241,0.35);}
.wc-trail{position:fixed;border-radius:50%;background:#1770f1;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);}
@keyframes wcRipple{0%{transform:translate(-50%,-50%) scale(1);opacity:0.55;}100%{transform:translate(-50%,-50%) scale(3.2);opacity:0;}}
.wc-ripple{position:fixed;width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(77,163,255,0.7);pointer-events:none;z-index:99997;animation:wcRipple 0.65s ease-out forwards;}
</style>
</head>
<body>
<div class="wc-ring"></div>
<div class="wc-dot"></div>
<div class="cursor"></div>
<div class="cursor2"></div>
  <div class="logo">Aarvish</div>
  <div class="tagline">Innovative water &amp; renewable technologies</div>
  <div class="grid">
    <a href="Innovation - destop final Main.html" class="card">
      <div class="card-label">Innovation Page</div>
      <div class="card-title">Innovation</div>
      <div class="card-sub">Desktop version</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="Innovation-Mobile Main.html" class="card">
      <div class="card-label">Innovation Page</div>
      <div class="card-title">Innovation</div>
      <div class="card-sub">Mobile version</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="Inquiry Destop Main.html" class="card">
      <div class="card-label">Inquiry Page</div>
      <div class="card-title">Inquiry</div>
      <div class="card-sub">Desktop version</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="Inquiry-Mobile Main.html" class="card">
      <div class="card-label">Inquiry Page</div>
      <div class="card-title">Inquiry</div>
      <div class="card-sub">Mobile version</div>
      <div class="card-arrow">→</div>
    </a>
  </div>
<script>
// Custom cursor
(function(){
  var cursor = document.querySelector('.cursor');
  var cursorinner = document.querySelector('.cursor2');
  if(!cursor || !cursorinner) return;
  document.addEventListener('mousemove', function(e){
    cursor.style.transform = 'translate3d(calc('+e.clientX+'px - 50%),calc('+e.clientY+'px - 50%),0)';
    cursorinner.style.left = e.clientX+'px';
    cursorinner.style.top = e.clientY+'px';
  });
  document.addEventListener('mousedown', function(){ cursor.classList.add('click'); cursorinner.classList.add('cursorinnerhover'); });
  document.addEventListener('mouseup', function(){ cursor.classList.remove('click'); cursorinner.classList.remove('cursorinnerhover'); });
  document.querySelectorAll('a,button,[role="button"]').forEach(function(a){
    a.addEventListener('mouseover', function(){ cursor.classList.add('hover'); });
    a.addEventListener('mouseleave', function(){ cursor.classList.remove('hover'); });
  });
})();
</script>
<script>
(function(){
  var ring=document.querySelector('.wc-ring');
  var dot=document.querySelector('.wc-dot');
  if(!ring||!dot)return;
  var TRAIL=5;
  var trail=[];
  for(var i=0;i<TRAIL;i++){
    var t=document.createElement('div');
    t.className='wc-trail';
    var sz=(4.5-i*0.7);
    t.style.cssText='width:'+sz+'px;height:'+sz+'px;opacity:'+(0.32-i*0.055)+';';
    document.body.appendChild(t);
    trail.push({el:t,x:window.innerWidth/2,y:window.innerHeight/2});
  }
  var mx=window.innerWidth/2,my=window.innerHeight/2;
  var rx=mx,ry=my;
  document.addEventListener('mousemove',function(e){
    mx=e.clientX;my=e.clientY;
    dot.style.left=mx+'px';dot.style.top=my+'px';
  });
  function lerp(a,b,n){return(1-n)*a+n*b;}
  function tick(){
    rx=lerp(rx,mx,0.11);ry=lerp(ry,my,0.11);
    ring.style.left=rx+'px';ring.style.top=ry+'px';
    var px=mx,py=my;
    trail.forEach(function(t,i){
      t.x=lerp(t.x,px,0.19-i*0.025);
      t.y=lerp(t.y,py,0.19-i*0.025);
      t.el.style.left=t.x+'px';t.el.style.top=t.y+'px';
      px=t.x;py=t.y;
    });
    requestAnimationFrame(tick);
  }
  tick();
  document.addEventListener('mousedown',function(e){
    ring.classList.add('click');dot.classList.add('click');
    var r=document.createElement('div');r.className='wc-ripple';
    r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';
    document.body.appendChild(r);
    setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},700);
  });
  document.addEventListener('mouseup',function(){ring.classList.remove('click');dot.classList.remove('click');});
  document.querySelectorAll('a,button,[role="button"]').forEach(function(el){
    el.addEventListener('mouseenter',function(){ring.classList.add('hover');});
    el.addEventListener('mouseleave',function(){ring.classList.remove('hover');});
  });
})();
</script>
</body>
</html>
